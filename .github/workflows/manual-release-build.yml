name: manual-release-build

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: Build x86_64 Linux artifact on ubuntu-24.04
        required: true
        default: true
        type: boolean
      build_macos_intel:
        description: Build x86_64 macOS artifact on macos-15-intel
        required: true
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Release build — x86_64-unknown-linux-gnu
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      CARGO_INCREMENTAL: "0"
      # Match upstream release/CI release-profile builds. The repository's
      # default release profile uses fat LTO, which is too heavy for fork
      # GitHub-hosted Linux release runners.
      CARGO_PROFILE_RELEASE_LTO: thin
      SCCACHE_CACHE_SIZE: 10G
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Compute lockfile hash
        id: lockhash
        shell: bash
        run: |
          set -euo pipefail
          echo "hash=$(sha256sum Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$(sha256sum rust-toolchain.toml | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: manual-release-linux-cargo-home-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
          restore-keys: |
            manual-release-linux-cargo-home-${{ steps.lockhash.outputs.hash }}-
            manual-release-linux-cargo-home-

      - name: Restore sccache cache
        id: cache_sccache_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/sccache
          key: manual-release-linux-sccache-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
          restore-keys: |
            manual-release-linux-sccache-${{ steps.lockhash.outputs.hash }}-
            manual-release-linux-sccache-

      - name: Install sccache
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: sccache

      - name: Configure sccache
        shell: bash
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cargo"
          cat > "$HOME/.cargo/config.toml" <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: cargo build --release
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=${CARGO_PROFILE_RELEASE_LTO}"
          cargo build \
            -p codex-cli --bin codex \
            -p codex-app-server --bin codex-app-server \
            -p codex-responses-api-proxy --bin codex-responses-api-proxy \
            --release \
            --timings

      - name: Validate Linux binaries
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/codex --help > "${RUNNER_TEMP}/codex-help.txt" 2>&1
          if [[ ! -s "${RUNNER_TEMP}/codex-help.txt" ]]; then
            echo "codex --help produced no output" >&2
            exit 1
          fi
          ./target/release/codex-app-server --help > "${RUNNER_TEMP}/codex-app-server-help.txt" 2>&1
          ./target/release/codex-responses-api-proxy --help > "${RUNNER_TEMP}/codex-responses-api-proxy-help.txt" 2>&1
          for binary in codex codex-app-server codex-responses-api-proxy; do
            if [[ "$(wc -c < "target/release/${binary}")" -le 1000000 ]]; then
              echo "${binary} binary is unexpectedly small" >&2
              ls -lh "target/release/${binary}" >&2
              exit 1
            fi
          done

      - name: Package Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="codex-x86_64-unknown-linux-gnu"
          mkdir -p dist/"${artifact}"
          cp target/release/codex dist/"${artifact}"/codex
          cp target/release/codex-app-server dist/"${artifact}"/codex-app-server
          cp target/release/codex-responses-api-proxy dist/"${artifact}"/codex-responses-api-proxy
          tar -C dist -czf "${artifact}.tar.gz" "${artifact}"
          sha256sum "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-x86_64-unknown-linux-gnu-${{ github.run_id }}
          path: |
            codex-rs/codex-x86_64-unknown-linux-gnu.tar.gz
            codex-rs/codex-x86_64-unknown-linux-gnu.tar.gz.sha256
          retention-days: 14

      - name: Upload Cargo timings
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-manual-release-x86_64-unknown-linux-gnu
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn
          retention-days: 14

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Save cargo home cache
        if: always() && !cancelled() && steps.cache_cargo_home_restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: manual-release-linux-cargo-home-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Save sccache cache
        if: always() && !cancelled() && steps.cache_sccache_restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/sccache
          key: manual-release-linux-sccache-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

  macos_intel:
    name: Release build — x86_64-apple-darwin
    if: ${{ inputs.build_macos_intel }}
    runs-on: macos-15-intel
    timeout-minutes: 360
    env:
      CARGO_INCREMENTAL: "0"
      # Match upstream release/CI release-profile builds.
      CARGO_PROFILE_RELEASE_LTO: thin
      SCCACHE_CACHE_SIZE: 10G
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Compute lockfile hash
        id: lockhash
        shell: bash
        run: |
          set -euo pipefail
          echo "hash=$(shasum -a 256 Cargo.lock | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "toolchain_hash=$(shasum -a 256 rust-toolchain.toml | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore cargo home cache
        id: cache_cargo_home_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: manual-release-macos-intel-cargo-home-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
          restore-keys: |
            manual-release-macos-intel-cargo-home-${{ steps.lockhash.outputs.hash }}-
            manual-release-macos-intel-cargo-home-

      - name: Restore sccache cache
        id: cache_sccache_restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/sccache
          key: manual-release-macos-intel-sccache-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
          restore-keys: |
            manual-release-macos-intel-sccache-${{ steps.lockhash.outputs.hash }}-
            manual-release-macos-intel-sccache-

      - name: Install sccache
        uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2.62.49
        with:
          tool: sccache

      - name: Configure sccache
        shell: bash
        run: |
          set -euo pipefail
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.cargo"
          cat > "$HOME/.cargo/config.toml" <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: cargo build --release
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=${CARGO_PROFILE_RELEASE_LTO}"
          cargo build \
            -p codex-cli --bin codex \
            -p codex-app-server --bin codex-app-server \
            -p codex-responses-api-proxy --bin codex-responses-api-proxy \
            --release \
            --timings

      - name: Validate macOS Intel binaries
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/codex --help > "${RUNNER_TEMP}/codex-help.txt" 2>&1
          if [[ ! -s "${RUNNER_TEMP}/codex-help.txt" ]]; then
            echo "codex --help produced no output" >&2
            exit 1
          fi
          ./target/release/codex-app-server --help > "${RUNNER_TEMP}/codex-app-server-help.txt" 2>&1
          ./target/release/codex-responses-api-proxy --help > "${RUNNER_TEMP}/codex-responses-api-proxy-help.txt" 2>&1
          for binary in codex codex-app-server codex-responses-api-proxy; do
            if [[ "$(wc -c < "target/release/${binary}")" -le 1000000 ]]; then
              echo "${binary} binary is unexpectedly small" >&2
              ls -lh "target/release/${binary}" >&2
              exit 1
            fi
          done

      - name: Package macOS Intel artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="codex-x86_64-apple-darwin"
          mkdir -p dist/"${artifact}"
          cp target/release/codex dist/"${artifact}"/codex
          cp target/release/codex-app-server dist/"${artifact}"/codex-app-server
          cp target/release/codex-responses-api-proxy dist/"${artifact}"/codex-responses-api-proxy
          tar -C dist -czf "${artifact}.tar.gz" "${artifact}"
          shasum -a 256 "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: codex-x86_64-apple-darwin-${{ github.run_id }}
          path: |
            codex-rs/codex-x86_64-apple-darwin.tar.gz
            codex-rs/codex-x86_64-apple-darwin.tar.gz.sha256
          retention-days: 14

      - name: Upload Cargo timings
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cargo-timings-manual-release-x86_64-apple-darwin
          path: codex-rs/target/**/cargo-timings/cargo-timing.html
          if-no-files-found: warn
          retention-days: 14

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Save cargo home cache
        if: always() && !cancelled() && steps.cache_cargo_home_restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: manual-release-macos-intel-cargo-home-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}

      - name: Save sccache cache
        if: always() && !cancelled() && steps.cache_sccache_restore.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/sccache
          key: manual-release-macos-intel-sccache-${{ steps.lockhash.outputs.hash }}-${{ steps.lockhash.outputs.toolchain_hash }}
